name: 📊 Weekly CLAUDE.md Report

on:
  schedule:
    - cron: '0 18 * * 5'  # 金曜 AM3:00 JST (UTC+9)
  workflow_dispatch:

jobs:
  weekly-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 全履歴必要（git log --since 用）

      - name: Run weekly CLAUDE.md report
        run: |
          python3 scripts/weekly-claude-md-report.py 2>&1
          echo "✅ weekly report completed"

      - name: Commit report
        run: |
          git config user.name  "Claude Nightly Bot"
          git config user.email "claude-bot@noreply.github.com"
          JST_DATE=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          git add claude/scripts/growth-log.md 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: 📊 weekly CLAUDE.md report (${JST_DATE} JST)"
            git push
          else
            echo "ℹ️ 変更なし"
          fi

      - name: Notify Discord
        if: always()
        run: |
          JST_DATE=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            EMOJI="📊"; COLOR=3447003
          else
            EMOJI="❌"; COLOR=15158332
          fi
          # growth-log の週次エントリからdiff抜粋
          SUMMARY=$(grep -A 15 "## ${JST_DATE} 週次" claude/scripts/growth-log.md 2>/dev/null \
            | grep -v "^##" | grep -v "^\`\`\`" | grep -E "^\+|^-|^- " | head -6 \
            | sed 's/^/• /' || echo "• (詳細なし)")
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"${EMOJI} Weekly CLAUDE.md Report — ${JST_DATE}\",
                \"color\": ${COLOR},
                \"description\": \"${SUMMARY}\",
                \"footer\": {\"text\": \"hisawo130/dotfiles • Run #${{ github.run_number }}\"}
              }]
            }" || true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
