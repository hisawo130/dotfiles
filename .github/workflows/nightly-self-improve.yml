name: 🌙 Nightly Self-Improve

on:
  schedule:
    - cron: '0 18 * * 1-5'  # AM3:00 JST (UTC+9)、月〜金のみ
  workflow_dispatch:        # 手動実行も可能

jobs:
  self-improve:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # コミット・プッシュに必要

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Claude environment
        run: |
          set -euo pipefail
          mkdir -p ~/.claude/logs
          rm -rf ~/.claude/learnings ~/.claude/memory
          ln -sfn "$(pwd)/claude/learnings" ~/.claude/learnings
          ln -sfn "$(pwd)/claude/memory"    ~/.claude/memory
          echo "✅ Claude environment ready"

      - name: Run nightly self-improvement
        run: |
          set -euo pipefail

          # STEP 1: preprocess — stale dates / metrics / gotcha候補 / growth-log scaffold
          python3 scripts/nightly-preprocess.py \
            > ~/.claude/logs/nightly-digest.json \
            2> ~/.claude/logs/nightly-preprocess.log
          cat ~/.claude/logs/nightly-preprocess.log
          echo "✅ preprocess completed"

          # STEP 2: shell validate — bash -n で全 .sh ファイルを検証
          python3 scripts/nightly-validate-shell.py \
            > ~/.claude/logs/nightly-shell.json \
            2>> ~/.claude/logs/nightly-preprocess.log
          cat ~/.claude/logs/nightly-preprocess.log | tail -5
          echo "✅ shell validate completed"

          # STEP 3: postprocess — growth-log の placeholder を埋める
          python3 scripts/nightly-postprocess.py \
            ~/.claude/logs/nightly-digest.json \
            ~/.claude/logs/nightly-shell.json \
            2>> ~/.claude/logs/nightly-preprocess.log
          echo "✅ postprocess completed"

      - name: Commit improvements
        run: |
          set -euo pipefail
          git config user.name  "Claude Nightly Bot"
          git config user.email "claude-bot@noreply.github.com"
          JST_DATE=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          git add claude/learnings/ claude/memory/ claude/CLAUDE.md claude/scripts/growth-log.md 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: 🌙 nightly self-improve (${JST_DATE} JST)"
            git push
            echo "✅ 改善内容をコミットしました"
          else
            echo "ℹ️ 変更なし — コミットをスキップ"
          fi

      - name: Notify Discord
        if: always()
        run: |
          JST_DATE=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          STATUS="${{ job.status }}"
          python3 - "$JST_DATE" "$STATUS" "$DISCORD_WEBHOOK_URL" <<'PYEOF'
import sys, json, urllib.request
jst_date, status, webhook_url = sys.argv[1], sys.argv[2], sys.argv[3]
if not webhook_url:
    sys.exit(0)
emoji  = "🌙" if status == "success" else "❌"
color  = 3066993 if status == "success" else 15158332
try:
    lines = open("claude/scripts/growth-log.md").read().splitlines()
    in_section, bullets = False, []
    for line in lines:
        if f"## {jst_date} 夜間" in line:
            in_section = True
        elif in_section and line.startswith("## "):
            break
        elif in_section and line.startswith("- ") and len(bullets) < 5:
            bullets.append("• " + line[2:])
    summary = "\n".join(bullets) if bullets else "• (変更なし)"
except Exception:
    summary = "• (詳細取得失敗)"
payload = json.dumps({"embeds": [{"title": f"{emoji} Nightly Self-Improve — {jst_date}", "color": color, "description": summary, "footer": {"text": "hisawo130/dotfiles • Run #${{ github.run_number }}"}}]}).encode()
req = urllib.request.Request(webhook_url, data=payload, headers={"Content-Type": "application/json"}, method="POST")
try:
    urllib.request.urlopen(req)
except Exception as e:
    print(f"Discord notify failed: {e}", file=sys.stderr)
PYEOF
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-log-${{ github.run_number }}
          path: ~/.claude/logs/nightly-preprocess.log
          retention-days: 30
