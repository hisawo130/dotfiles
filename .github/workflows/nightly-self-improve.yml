name: 🌙 Nightly Self-Improve

on:
  schedule:
    - cron: '0 18 * * *'  # AM3:00 JST (UTC+9)
  workflow_dispatch:        # 手動実行も可能

jobs:
  self-improve:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # コミット・プッシュに必要

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 全履歴取得（学習ログの履歴参照のため）

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        # NOTE: pin to a specific version (e.g. @1.x.x) to avoid unexpected breaking changes.
        # Leaving as "latest" for now; update after validating each new release.
        run: npm install -g @anthropic-ai/claude-code

      - name: Check required secrets
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::ANTHROPIC_API_KEY が設定されていません。Repository Secrets を確認してください。"
            exit 1
          fi
          echo "✅ ANTHROPIC_API_KEY confirmed"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Setup Claude environment
        run: |
          set -euo pipefail
          mkdir -p ~/.claude/logs
          # CI 用の設定ファイルをコピー
          cp claude/templates/settings.ci.json ~/.claude/settings.json
          # ディレクトリごとシンボリックリンク
          # 既存ディレクトリを先に削除（ln -sfn は既存ディレクトリがあると内部に入れ子になる）
          rm -rf ~/.claude/learnings ~/.claude/memory
          ln -sfn "$(pwd)/claude/learnings" ~/.claude/learnings
          ln -sfn "$(pwd)/claude/memory" ~/.claude/memory
          echo "✅ Claude environment ready"

      - name: Run nightly self-improvement
        id: claude_run
        run: |
          set -uo pipefail
          # SECURITY NOTE: --dangerously-skip-permissions bypasses ALL allow/deny rules
          # in claude/templates/settings.ci.json (including the deny list for rm -rf, curl, etc.).
          # Scope control relies on the prompt itself; review claude/scripts/prompts/nightly-review.md
          # and growth-log.md output after each run to detect unexpected actions.
          claude -p "$(cat claude/scripts/prompts/nightly-review.md)" \
            --dangerously-skip-permissions \
            --max-turns 50 \
            2>&1 | tee ~/.claude/logs/nightly-ci.log
          CLAUDE_STATUS=${PIPESTATUS[0]}
          if [ "$CLAUDE_STATUS" -ne 0 ]; then
            echo "::warning::Claude exited with status $CLAUDE_STATUS (--max-turns に到達したか、エラーが発生しました)"
          fi
          echo "✅ Claude run completed"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit improvements
        run: |
          set -euo pipefail
          git config user.name  "Claude Nightly Bot"
          git config user.email "claude-bot@noreply.github.com"
          # JST 日付をコミットメッセージに使用
          JST_DATE=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          # シンボリックリンク経由で更新されたファイルをステージ
          git add claude/learnings/ claude/memory/ claude/CLAUDE.md 2>/dev/null || true
          git add claude/scripts/growth-log.md 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: 🌙 nightly self-improve (${JST_DATE} JST)"
            git push
            echo "✅ 改善内容をコミットしました"
          else
            echo "ℹ️ 変更なし — コミットをスキップ"
          fi

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-log-${{ github.run_number }}
          path: ~/.claude/logs/nightly-ci.log
          retention-days: 30
